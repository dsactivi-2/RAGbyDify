# ══════════════════════════════════════════════════════════════
# CLOUD CODE TEAM — MEM0 LOCAL STACK
# ══════════════════════════════════════════════════════════════
# Nutzt bestehende Qdrant (docker_default) und Neo4j (bridge)
# Ollama laeuft als systemd auf dem Host (172.17.0.1:11434)
# Usage: cd /opt/cloud-code/mem0-local && docker compose -f docker-compose.mem0.yml up -d
# ══════════════════════════════════════════════════════════════

services:

  # ──────────────────────────────────────────
  # MEM0 API SERVER (ersetzt api.mem0.ai)
  # ──────────────────────────────────────────
  mem0:
    build:
      context: ./mem0-server
      dockerfile: Dockerfile
    container_name: cct-mem0
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      MEM0_HOST: "0.0.0.0"
      MEM0_PORT: "8002"
      MEM0_LOG_LEVEL: "INFO"

      # Vector Store (Qdrant — laeuft in Dify docker_default Netzwerk)
      VECTOR_STORE_PROVIDER: "qdrant"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "mem0_memories"

      # Graph Store (Neo4j — laeuft auf Bridge, erreichbar via Host-IP)
      GRAPH_STORE_PROVIDER: "neo4j"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "22e58741703f24f1913550c9a8a51c99"
      NEO4J_DATABASE: "mem0"

      # LLM fuer Memory-Extraktion (Ollama — systemd auf Host)
      LLM_PROVIDER: "ollama"
      LLM_MODEL: "glm-4.7:cloud"
      LLM_BASE_URL: "http://172.17.0.1:11434"
      LLM_TEMPERATURE: "0.1"

      # Embeddings (Ollama)
      EMBEDDER_PROVIDER: "ollama"
      EMBEDDER_MODEL: "qwen3-embedding:latest"
      EMBEDDER_BASE_URL: "http://172.17.0.1:11434"
      EMBEDDER_EMBEDDING_DIMS: "1536"

      # Memory Config
      MEM0_MEMORY_THRESHOLD: "0.7"
      MEM0_MAX_MEMORIES: "10000"
      MEM0_AUTO_EXTRACT: "true"
    volumes:
      - mem0_data:/app/data
    networks:
      - docker_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────
  # AGENT WATCHER (Auto-Detection + Monitoring)
  # ──────────────────────────────────────────
  agent-watcher:
    build:
      context: ./agent-watcher
      dockerfile: Dockerfile
    container_name: cct-agent-watcher
    restart: unless-stopped
    environment:
      DIFY_URL: "https://difyv2.activi.io"
      DIFY_ADMIN_EMAIL: "ds.selmanovic@gmail.com"
      DIFY_ADMIN_PASSWORD: "UIbyLfletYZ9VtQVxnUZ"
      TELEGRAM_TOKEN: "8718856271:AAHKkOplIj0bgZ3sGa15cLfEbzoSMzpHj4o"
      TELEGRAM_CHAT_ID: ""
      MEM0_LOCAL_URL: "http://cct-mem0:8002"
      POLL_INTERVAL: "60"
      HEALTHCHECK_INTERVAL: "300"
      LOG_LEVEL: "INFO"
    volumes:
      - watcher_data:/app/data
    depends_on:
      mem0:
        condition: service_healthy
    networks:
      - docker_default

volumes:
  mem0_data:
    driver: local
  watcher_data:
    driver: local

networks:
  docker_default:
    external: true
    name: docker_default
